name: Deploy image

on:
  workflow_call:
    inputs:
      project_name:
        description: Project name
        required: true
        type: string

      repository_name:
        description: Container repository name
        required: true
        type: string

      tag_name:
        description: Image name
        required: true
        type: string

      transformation_environment:
        description: For transformation environment
        required: true
        type: boolean

      git_hub_username:
        description: The github username
        required: true
        type: string

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Show triggering GitHub username
        run: |
          Write-Host "GitHub user who triggered this deployment: ${{ inputs.git_hub_username }}"

      - name: Deploy image for '${{ inputs.project_name }}'
        run: |
          Write-Host "Container repository name: ${{ inputs.repository_name }}"
          Write-Host "Tag name: ${{ inputs.tag_name }}"

