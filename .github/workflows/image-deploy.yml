name: Deploy image

on:
  workflow_call:
    inputs:
      project_name:
        description: Project name
        required: true
        type: string

      repository_name:
        description: Container repository name
        required: true
        type: string

      tag_name:
        description: Image name
        required: true
        type: string

      transformation_environment:
        description: For transformation environment
        required: true
        type: boolean

      github_branch:
        description: Github branch reference
        required: true
        type: string

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Deploy image for '${{ inputs.project_name }}'
        run: |
          $azurePipelineUrl = ./scripts/Initialize-AzurePipeline.ps1 `
            -Pat "${{ secrets.AZURE_DEVOPS_TOKEN }}" `
            -OrgProjectUrl "${{ secrets.AZURE_DEVOPS_PROJECT }}" `
            -PipelineId "${{ secrets.AZURE_PIPELINE_ID }}" `
            -BranchRef "${{ inputs.github_branch }}" `
            -ProjectName "${{ inputs.project_name }}" `
            -RepositoryName "${{ inputs.repository_name }}" `
            -Tag "${{ inputs.tag_name }}" `
            -TransformationEnv ${{ inputs.transformation_environment }} `
            -ApplicationShortName "Bob" `
          echo "azure_pipeline_url=$azurePipelineUrl" >> $env:GITHUB_OUTPUT
          Write-Host "Azure pipeline : ${{ azure_pipeline_url }}"

