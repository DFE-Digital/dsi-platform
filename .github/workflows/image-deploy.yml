name: Deploy image

on:
  workflow_call:
    inputs:
      project_name:
        description: Project name
        required: true
        type: string

      repository_name:
        description: Container repository name
        required: true
        type: string

      tag_name:
        description: Image name
        required: true
        type: string

      transformation_environment:
        description: For transformation environment
        required: true
        type: boolean

      github_username:
        description: The github username that triggered the deployment
        required: true
        type: string

      github_title:
        description: The github pr or title
        required: true
        type: string

      github_workflow_url:
        description: The url for accessing the github workflow
        required: true
        type: string

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Deploy image for '${{ inputs.project_name }}'
        run: |
          Write-Host "Container repository name: ${{ inputs.repository_name }}"
          Write-Host "Tag name: ${{ inputs.tag_name }}"
          Write-Host "GitHub user: ${{ inputs.github_username }}"
          Write-Host "GitHub title: ${{ inputs.github_title }}"
          Write-Host "GitHub workflow url: ${{ inputs.github_workflow_url }}"

