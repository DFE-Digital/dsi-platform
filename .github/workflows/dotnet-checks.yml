name: Check .NET sources

on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: true

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup .NET Core 8.x
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Initialize solution for all projects
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: pwsh
        run: Copy-Item -Path ./dsi-platform.sln -Destination ./build.sln

      - name: Initialize solution for affected projects
        if: ${{ github.event_name != 'workflow_dispatch' }}
        shell: pwsh
        run: ./scripts/workflows/Initialize-BuildSolutionForChangedProjects

      - name: Start sonar scanner
        shell: pwsh
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet sonarscanner begin `
            /o:"dfe-digital" `
            /k:"DFE-Digital_dsi-platform" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Build project
        run: dotnet build ./build.sln --no-incremental

      - name: Run unit tests
        run: dotnet test ./build.sln --collect "Code Coverage"

      - name: Stop sonar scanner
        shell: pwsh
        run: |
          dotnet sonarscanner end `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
