name: Publish development .NET packages

on:
  workflow_call:
    inputs:
      lifecycle_stage:
        description: The lifecycle_stage either 'dev' or 'rel'
        required: true
        type: string
    secrets:
      AZURE_DEVOPS_TOKEN:
        required: true
      AZURE_NUGET_SOURCE:
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET Core 8.x
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"

      - name: Build project
        run: |
          dotnet build ./solutions/dsi-packages.sln `
            /p:Configuration=Release `
            /p:BuildPackages=true

      # - name: Authenticate to Azure
      #   uses: azure/login@v1
      #   with:
      #     client-id: ${{ secrets.AZURE_CLIENT_ID }}
      #     tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #     subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      #     client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Locate .nupkg files
        run: |
          Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Recurse -Filter "*.nupkg" |
            ForEach-Object { Write-Host "Found package: $($_.FullName)" }
        shell: pwsh

      - name: Push NuGet packages to Azure Artifactss
        run: |
          # Loop through each .nupkg file and push it
          Get-ChildItem -Path "$env:GITHUB_WORKSPACE/src" -Recurse -Filter "*.nupkg" |
            ForEach-Object {
              Write-Host "Uploading package: $($_.Name)"
              dotnet nuget push $_.FullName `
                --source "${{ secrets.AZURE_NUGET_SOURCE }}" `
                --api-key "${{ secrets.AZURE_DEVOPS_TOKEN }}" `
                --skip-duplicate
            }
        shell: pwsh
